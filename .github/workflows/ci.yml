name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Validate Ruby syntax
        run: ruby -c streamline.rb

      - name: Validate update script syntax
        run: bash -n scripts/update-formula.sh

      - name: Check for placeholder hashes
        run: |
          if grep -q "PLACEHOLDER_SHA256" streamline.rb; then
            echo "::warning::Formula contains placeholder SHA256 hashes — run './scripts/update-formula.sh <version>' before publishing"
          else
            echo "✅ All SHA256 hashes are populated"
          fi
