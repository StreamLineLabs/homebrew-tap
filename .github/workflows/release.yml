name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate formula
        run: |
          brew install --build-from-source ./Formula/streamline.rb
          brew test ./Formula/streamline.rb

      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
